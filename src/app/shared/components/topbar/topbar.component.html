<header class="tb">
  <!-- Desktop: hamburger para colapsar sidebar -->
  <button class="tb-burger d-none d-lg-flex" (click)="toggleSidebar.emit()" aria-label="Alternar menu">
    <i class="bi bi-list"></i>
  </button>

  <!-- Mobile: nome do app (sidebar fica oculta, bottom nav cuida da navegação) -->
  <span class="tb-brand d-flex d-lg-none">
    <i class="bi bi-bar-chart-fill me-2"></i>Controle Financeiro
  </span>

  <div class="tb-spacer"></div>

  <button class="theme-toggle-nav d-flex align-items-center gap-1"
          [class.theme-toggle-dark]="!theme.isDark"
          [class.theme-toggle-light]="theme.isDark"
          (click)="theme.toggle()"
          [title]="theme.isDark ? 'Mudar para modo claro' : 'Mudar para modo escuro'"
          aria-label="Alternar tema">
    @if (theme.isDark) {
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    }
  </button>

  <span class="tb-user">
    <i class="bi bi-wallet2 me-1"></i>
    <span class="tb-username">{{ keycloak.getUsername() }}</span>
    @if (keycloak.isAdmin()) {
      <span class="badge bg-warning text-dark ms-1">ADMIN</span>
    } @else {
      <span class="badge bg-secondary ms-1">VIEWER</span>
    }
  </span>

  <button class="btn btn-outline-secondary btn-sm" (click)="keycloak.logout()">
    <i class="bi bi-box-arrow-right me-1"></i><span class="d-none d-sm-inline">Sair</span>
  </button>
</header>
