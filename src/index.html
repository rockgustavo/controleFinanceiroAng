<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Controle Financeiro</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap">
  <style>
    .app-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: #22303a;
      color: #f1f5f9;
      font-family: "Nunito Sans", system-ui, sans-serif;
    }
    .app-splash svg { color: #14b8a6; }
    .app-splash__title { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.02em; }
    .app-splash__dots { display: flex; gap: 0.5rem; }
    .app-splash__dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #14b8a6;
      opacity: 0.35;
      animation: splashPulse 1.2s infinite ease-in-out;
    }
    .app-splash__dots span:nth-child(2) { animation-delay: 0.15s; }
    .app-splash__dots span:nth-child(3) { animation-delay: 0.3s; }
    .app-splash__dots span:nth-child(4) { animation-delay: 0.45s; }
    .app-splash__dots span:nth-child(5) { animation-delay: 0.6s; }
    @keyframes splashPulse {
      0%, 100% { opacity: 0.25; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-4px); }
    }
  </style>
</head>
<body>
  <app-root>
    <div class="app-splash">
      <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 16 16" fill="currentColor">
        <path d="M1 11a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1zm5-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1zm5-5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1z"/>
      </svg>
      <div class="app-splash__title">Controle Financeiro</div>
      <div class="app-splash__dots"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
  </app-root>
</body>
</html>
